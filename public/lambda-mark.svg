<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Lambda and Backslash with Inter Font -->
  <text x="24" y="36" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" text-anchor="middle" fill="url(#lambdaGradient)">Λ\</text>
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="lambdaGradient" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
