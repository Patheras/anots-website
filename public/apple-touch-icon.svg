<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with Gradient -->
  <rect width="180" height="180" rx="40" fill="url(#bgGradient)"/>
  
  <!-- Lambda and Backslash with Inter Font -->
  <text x="90" y="120" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="80" font-weight="700" text-anchor="middle" fill="white">Λ\</text>
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
</svg>

