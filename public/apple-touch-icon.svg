<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Background with Glow -->
  <rect width="180" height="180" fill="url(#bgGradient)"/>
  
  <!-- Subtle Radial Glow -->
  <rect width="180" height="180" fill="url(#glowGradient)" opacity="0.4"/>
  
  <!-- Lambda and Backslash - White -->
  <text x="90" y="120" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="80" font-weight="700" text-anchor="middle" fill="#FAFAFA">Λ\</text>
  
  <!-- Gradient Definitions -->
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A0A0B"/>
      <stop offset="30%" stop-color="#1A1A1F"/>
      <stop offset="70%" stop-color="#1A1A1F"/>
      <stop offset="100%" stop-color="#0A0A0B"/>
    </linearGradient>
    
    <!-- Radial Glow -->
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#5E6AD2" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0A0A0B" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>

